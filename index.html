<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Roller Coaster Presentation</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  #c { display: block; width: 100vw; height: 100dvh; height: 100vh; }

  /* ── Slide overlay (fixed on screen, not in 3D) ── */
  #slide-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 80;
  }
  .slide-card {
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    width: min(480px, 85vw);
    padding: 36px 40px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    color: #fff;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.08) inset;
    position: absolute;
    top: 50%;
  }
  .slide-card.side-left {
    left: 5vw;
    transform: translateY(-50%) translateX(-30px);
  }
  .slide-card.side-right {
    right: 5vw;
    transform: translateY(-50%) translateX(30px);
  }
  .slide-card.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .slide-card.side-left.visible {
    transform: translateY(-50%) translateX(0);
  }
  .slide-card.side-right.visible {
    transform: translateY(-50%) translateX(0);
  }
  .slide-card .accent {
    display: inline-block;
    width: 40px; height: 4px;
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .slide-card h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .slide-card p {
    font-size: 15px;
    line-height: 1.65;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .slide-card .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    opacity: 0.65;
  }

  .slide-card.clickable {
    cursor: pointer;
    transition: opacity 0.5s ease, transform 0.5s ease, background 0.25s ease;
  }
  .slide-card.clickable:hover {
    background: rgba(255,255,255,0.18);
  }
  .slide-card .click-hint {
    margin-top: 12px;
    font-size: 12px;
    opacity: 0.45;
    letter-spacing: 0.5px;
  }
  .slide-card.center-intro {
    left: 50%;
    width: min(580px, 90vw);
    text-align: center;
    transform: translateX(-50%) translateY(-50%) scale(0.95);
  }
  .slide-card.center-intro.visible {
    transform: translateX(-50%) translateY(-50%) scale(1);
  }

  /* ── Solution Modal ── */
  #solution-modal {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #solution-modal.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal-backdrop {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .modal-content {
    position: relative;
    width: min(560px, 90vw);
    max-height: 75vh;
    overflow-y: auto;
    padding: 36px 40px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    color: #fff;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }
  .modal-content .modal-accent {
    display: inline-block;
    width: 40px; height: 4px;
    border-radius: 2px;
    margin-bottom: 16px;
  }
  .modal-content h3 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: -0.3px;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .modal-content .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    opacity: 0.55;
  }
  .modal-content .section-label + p {
    margin-bottom: 20px;
  }
  .modal-content p {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .modal-content p em {
    font-style: italic;
    color: rgba(255,255,255,0.95);
  }

  /* ── UI overlay ── */
  #ui {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); pointer-events: none; z-index: 100;
  }
  #slide-counter {
    font-size: 13px; color: rgba(255,255,255,0.7);
    margin-bottom: 10px; font-variant-numeric: tabular-nums;
    letter-spacing: 1px; text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #progress {
    display: flex; gap: 10px; pointer-events: auto;
  }
  #progress .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.35s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  #progress .dot.active {
    background: #fff;
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    transform: scale(1.3);
  }

  .nav-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.75);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; z-index: 100; pointer-events: auto;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.25); color: #fff; }
  #nav-prev { left: 20px; }
  #nav-next { right: 20px; }

  #hint {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.85);
    font-size: 17px; text-align: center;
    pointer-events: none; z-index: 200;
    transition: opacity 1s ease;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    line-height: 1.8;
    background: rgba(0,0,0,0.2);
    padding: 24px 36px;
    border-radius: 16px;
    backdrop-filter: blur(8px);
  }
  #hint span { display: block; font-size: 13px; opacity: 0.6; margin-top: 6px; }

  #speed-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 50; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(255,255,255,0.06) 100%);
  }

  /* ── Password Gate ── */
  #password-gate {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.5s ease;
  }
  #password-gate.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .gate-card {
    width: min(420px, 88vw);
    padding: 40px 36px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    color: #fff;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
    text-align: center;
  }
  .gate-card h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .gate-card p {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 24px;
  }
  #gate-input {
    display: block;
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
    font-family: inherit;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  #gate-input::placeholder { color: rgba(255,255,255,0.35); }
  #gate-input:focus { border-color: rgba(255,255,255,0.5); }
  #gate-submit {
    display: block;
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }
  #gate-submit:hover { background: rgba(255,255,255,0.28); }
  #gate-error {
    margin-top: 14px;
    font-size: 14px;
    color: #ff6b6b;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .slide-card {
      position: fixed !important;
      width: min(340px, 90vw);
      padding: 18px 20px;
      top: auto !important;
      bottom: calc(56px + env(safe-area-inset-bottom, 0px)) !important;
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%) translateY(16px) !important;
      opacity: 0 !important;
    }
    .slide-card.visible {
      transform: translateX(-50%) translateY(0) !important;
      opacity: 1 !important;
    }
    .slide-card h2 { font-size: 18px; margin-bottom: 5px; }
    .slide-card p { font-size: 12.5px; line-height: 1.45; }
    .slide-card .tag { font-size: 9px; margin-bottom: 4px; }
    .slide-card .accent { margin-bottom: 6px; width: 30px; height: 3px; }
    .nav-arrow {
      top: 50%; bottom: auto;
      transform: translateY(-50%);
      width: 32px; height: 32px; font-size: 13px;
    }
    #nav-prev { left: 6px; }
    #nav-next { right: 6px; }
    #hint {
      top: 28%;
      font-size: 14px;
      padding: 16px 22px;
      width: min(280px, 82vw);
    }
    #hint span { font-size: 11px; }
    #progress .dot { width: 7px; height: 7px; }
    #progress { gap: 6px; }
    #ui { padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
    #slide-counter { font-size: 11px; margin-bottom: 5px; }
    .modal-content { padding: 24px 22px; max-height: 70vh; }
    .modal-content h3 { font-size: 18px; }
    .modal-content p { font-size: 13px; }
    .slide-card .click-hint { font-size: 11px; margin-top: 8px; }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<canvas id="c"></canvas>
<div id="speed-overlay"></div>

<!-- Password gate -->
<div id="password-gate">
  <div class="gate-card">
    <h2>Liability Loop-de-Loop</h2>
    <p>Enter the password to begin.</p>
    <input type="password" id="gate-input" placeholder="Password" autofocus>
    <button id="gate-submit">Enter</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- Slide content as fixed screen overlay -->
<div id="slide-overlay"></div>

<!-- Solution modal -->
<div id="solution-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-content"></div>
</div>

<div id="ui">
  <div id="slide-counter">1 / 6</div>
  <div id="progress"></div>
</div>

<button class="nav-arrow" id="nav-prev">&#8592;</button>
<button class="nav-arrow" id="nav-next">&#8594;</button>

<div id="hint" style="display:none">

//  DECRYPTION
// ═══════════════════════════════════
async function decryptSlides(password) {
  const raw = Uint8Array.from(atob(ENCRYPTED_SLIDES), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ciphertext = raw.slice(28);

  const keyMaterial = await crypto.subtle.importKey('raw',
    new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

const overlayEl = document.getElementById('slide-overlay');

const modalEl = document.getElementById('solution-modal');
const modalContentEl = modalEl.querySelector('.modal-content');
let modalOpen = false;

function openModal(slide) {
  modalContentEl.innerHTML = `
    <button class="modal-close">&times;</button>
    <div class="modal-accent" style="background:${slide.color}"></div>
    <h3>${slide.title}</h3>
    <div class="section-label">Legal Context</div>
    <p>${slide.law}</p>
    <div class="section-label">Proposed Solution</div>
    <p>${slide.solution}</p>
  `;
  modalEl.classList.add('open');
  modalOpen = true;
  modalContentEl.querySelector('.modal-close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeModal();
  });
}

function closeModal() {
  modalEl.classList.remove('open');
  modalOpen = false;
}

  e.stopPropagation();
  closeModal();

const gateInput = document.getElementById('gate-input');
const gateSubmit = document.getElementById('gate-submit');
const gateError = document.getElementById('gate-error');

async function attemptUnlock() {
  const password = gateInput.value;
  if (!password) return;
  gateError.textContent = '';
  gateSubmit.disabled = true;
  gateSubmit.textContent = 'Decrypting…';
  try {
    const slides = await decryptSlides(password);
    gateEl.classList.add('hidden');
    setTimeout(() => { gateEl.style.display = 'none'; }, 500);
    initPresentation(slides);
  } catch (e) {
    gateError.textContent = 'Incorrect password';
    gateSubmit.disabled = false;
    gateSubmit.textContent = 'Enter';
    gateInput.focus();
    gateInput.select();
  }
}

      // Soft clouds via noise-like pattern

const railRadius = 0.18;
const railSegments = 600;
const railOffset = 1.0;

function buildRail(offsetDir) {
  const points = [];
  for (let i = 0; i <= railSegments; i++) {
    const t = i / railSegments;
    const pos = curve.getPointAt(t);
    const tangent = curve.getTangentAt(t).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const right = new THREE.Vector3().crossVectors(tangent, up).normalize();
    points.push(pos.clone().add(right.multiplyScalar(offsetDir * railOffset)));
  }
  const railCurve = new THREE.CatmullRomCurve3(points, false);
  const geo = new THREE.TubeGeometry(railCurve, railSegments, railRadius, 6, false);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcc3333,
    metalness: 0.6,
    roughness: 0.35,
    emissive: 0x991111,
    emissiveIntensity: 0.15,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

// Cross-ties — oriented via track-local basis (tangent/right/trackUp)
const tieCount = 250;
const tieGeo = new THREE.BoxGeometry(1, 1, 1); // unit box, scaled by matrix
const tieMat = new THREE.MeshStandardMaterial({ color: 0x6b5b4a, roughness: 0.85 });
const tiesMesh = new THREE.InstancedMesh(tieGeo, tieMat, tieCount);
tiesMesh.castShadow = true;

const _m4 = new THREE.Matrix4();
const _up = new THREE.Vector3(0, 1, 0);
const _basisM = new THREE.Matrix4();

for (let i = 0; i < tieCount; i++) {
  const t = i / tieCount;
  const pos = curve.getPointAt(t);
  const tangent = curve.getTangentAt(t).normalize();

  // Build track-local frame
  const right = new THREE.Vector3().crossVectors(tangent, _up).normalize();
  const trackUp = new THREE.Vector3().crossVectors(right, tangent).normalize();

  // Basis: tie X-axis → right (across rails), Y-axis → trackUp, Z-axis → tangent
  // Then scale: X=2.4 (width across rails), Y=0.12 (thickness), Z=0.2 (depth along track)
  _basisM.makeBasis(right, trackUp, tangent);

  const scaleM = new THREE.Matrix4().makeScale(2.4, 0.12, 0.2);
  _m4.copy(_basisM).multiply(scaleM);

  // Position: on track centerline, lowered to sit under the rails
  const tiePos = pos.clone();
  tiePos.addScaledVector(trackUp, -railRadius - 0.06);
  _m4.setPosition(tiePos);

  tiesMesh.setMatrixAt(i, _m4);
}
tiesMesh.instanceMatrix.needsUpdate = true;
scene.add(tiesMesh);

// Support pillars — vertical columns from ground to track underside
const pillarCount = 100;
const pillarGeo = new THREE.CylinderGeometry(0.15, 0.22, 1, 6);
const pillarMat = new THREE.MeshStandardMaterial({ color: 0x778899, metalness: 0.4, roughness: 0.6 });
const pillarsMesh = new THREE.InstancedMesh(pillarGeo, pillarMat, pillarCount);
pillarsMesh.castShadow = true;

const _pillarQ = new THREE.Quaternion();

// Pre-sample track for collision checks (pillars & trees)
const trackSamples = [];
for (let j = 0; j <= 200; j++) trackSamples.push(curve.getPointAt(j / 200));

function nearTrack(x, z, minDist) {
  const minDistSq = minDist * minDist;
  for (let j = 0; j < trackSamples.length; j++) {
    const sp = trackSamples[j];
    const dx = sp.x - x, dz = sp.z - z;
    if (dx * dx + dz * dz < minDistSq) return true;
  }
  return false;
}

for (let i = 0; i < pillarCount; i++) {
  const t = i / pillarCount;
  const pos = curve.getPointAt(t);
  const groundY = -2;
  const height = pos.y - groundY - 0.3;

  // Hide pillar entirely if another track section passes between ground and this point
  let blocked = false;
  for (let j = 0; j < trackSamples.length; j++) {
    const sampleT = j / 200;
    if (Math.abs(sampleT - t) < 0.05) continue; // skip nearby points on same section
    const sp = trackSamples[j];
    const dx = sp.x - pos.x, dz = sp.z - pos.z;
    if (dx * dx + dz * dz < 25 && sp.y > groundY + 2 && sp.y < pos.y - 1) {
      blocked = true;
      break;
    }
  }

  if (height < 2.5 || blocked) {
    _m4.compose(new THREE.Vector3(0, -1000, 0), _pillarQ, new THREE.Vector3(0.001, 0.001, 0.001));
  } else {
    const center = new THREE.Vector3(pos.x, groundY + height / 2, pos.z);
    _m4.compose(center, _pillarQ, new THREE.Vector3(1, height, 1));
  }
  pillarsMesh.setMatrixAt(i, _m4);
}
pillarsMesh.instanceMatrix.needsUpdate = true;

  uniforms: {
    uTime: { value: 0 },
    uDeepColor: { value: new THREE.Color(0x1a5276) },

  },
  vertexShader: `
    uniform float uTime;
    varying vec2 vUv;
    varying float vWave;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vec3 pos = position;
      float wave = sin(pos.x * 0.3 + uTime * 1.2) * cos(pos.y * 0.4 + uTime * 0.8) * 0.6
                 + sin(pos.x * 0.7 + uTime * 2.0) * 0.2;
      pos.z += wave;
      vWave = wave;
      vec4 worldPos = modelMatrix * vec4(pos, 1.0);
      vWorldPos = worldPos.xyz;
      vNormal = normalize(normalMatrix * vec3(
        -cos(pos.x * 0.3 + uTime * 1.2) * 0.3 * 0.6,
        -sin(pos.y * 0.4 + uTime * 0.8) * 0.4 * 0.6,
        1.0
      ));
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uDeepColor;
    uniform vec3 uShallowColor;
    uniform vec3 uSkyColor;
    varying vec2 vUv;
    varying float vWave;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);
      vec3 waterColor = mix(uDeepColor, uShallowColor, vUv.y * 0.5 + vWave * 0.3 + 0.3);
      vec3 col = mix(waterColor, uSkyColor, fresnel * 0.6);
      float foam = smoothstep(0.35, 0.5, vWave);
      col = mix(col, vec3(1.0), foam * 0.15);
      gl_FragColor = vec4(col, 0.85);

  `
});

const balloonColors = [0xe74c3c, 0xf39c12, 0x3498db, 0x9b59b6, 0x1abc9c, 0xe67e22];
const balloonEnvelopeGeo = new THREE.SphereGeometry(4, 12, 10);
const balloonBasketGeo = new THREE.BoxGeometry(1.8, 1.2, 1.8);
const balloonBasketMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.9 });

for (let i = 0; i < 6; i++) {
  const group = new THREE.Group();
  const envelopeMat = new THREE.MeshStandardMaterial({
    color: balloonColors[i],
    roughness: 0.7,
    metalness: 0.1,
  });
  const envelope = new THREE.Mesh(balloonEnvelopeGeo, envelopeMat);
  envelope.scale.set(1, 1.3, 1);
  group.add(envelope);

  const basket = new THREE.Mesh(balloonBasketGeo, balloonBasketMat);
  basket.position.y = -6.5;
  group.add(basket);

  // Ropes
  const ropeMat = new THREE.LineBasicMaterial({ color: 0x8b6914 });
  const ropeOffsets = [[-0.7, -0.7], [0.7, -0.7], [-0.7, 0.7], [0.7, 0.7]];
  ropeOffsets.forEach(([rx, rz]) => {
    const ropeGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(rx * 1.5, -3.5, rz * 1.5),
      new THREE.Vector3(rx, -5.9, rz)
    ]);
    group.add(new THREE.Line(ropeGeo, ropeMat));
  });

  const angle = (i / 6) * Math.PI * 2 + rand() * 0.5;
  const dist = 80 + rand() * 120;
  group.position.set(
    Math.cos(angle) * dist,
    60 + rand() * 60,
    Math.sin(angle) * dist
  );
  group.userData = {
    baseY: group.position.y,
    bobSpeed: 0.3 + rand() * 0.4,
    bobAmount: 1.5 + rand() * 2,
    driftSpeed: 0.1 + rand() * 0.15,
    driftRadius: 3 + rand() * 5,
    phase: rand() * Math.PI * 2,
  };
  scene.add(group);
  balloons.push(group);
}

// ═══════════════════════════════════
//  AMBIENT FLOATING PARTICLES
// ═══════════════════════════════════
const ambientParticleCount = 150;
const ambientParticleGeo = new THREE.BufferGeometry();
const ambientPositions = new Float32Array(ambientParticleCount * 3);
const ambientOffsets = new Float32Array(ambientParticleCount * 3);
for (let i = 0; i < ambientParticleCount; i++) {
  ambientPositions[i * 3] = (Math.random() - 0.5) * 40;
  ambientPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
  ambientPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
  ambientOffsets[i * 3] = Math.random() * Math.PI * 2;
  ambientOffsets[i * 3 + 1] = Math.random() * Math.PI * 2;
  ambientOffsets[i * 3 + 2] = Math.random() * Math.PI * 2;
}
ambientParticleGeo.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
const ambientParticleMat = new THREE.PointsMaterial({
  color: 0xffd700,
  size: 0.15,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const ambientParticles = new THREE.Points(ambientParticleGeo, ambientParticleMat);
scene.add(ambientParticles);

// ═══════════════════════════════════
//  STATION SPARKLES
// ═══════════════════════════════════
const sparkleCount = 80;
const sparkleGeo = new THREE.BufferGeometry();
const sparklePositions = new Float32Array(sparkleCount * 3);
const sparkleVelocities = new Float32Array(sparkleCount * 3);
sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));

const sparkleMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.3,
  transparent: true,
  opacity: 0,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const sparkleParticles = new THREE.Points(sparkleGeo, sparkleMat);
scene.add(sparkleParticles);

let sparkleActive = false;
let sparkleTimer = 0;
const SPARKLE_DURATION = 2.0;

function fireSparkles() {
  sparkleActive = true;
  sparkleTimer = 0;
  for (let i = 0; i < sparkleCount; i++) {
    sparklePositions[i * 3] = camera.position.x;
    sparklePositions[i * 3 + 1] = camera.position.y;
    sparklePositions[i * 3 + 2] = camera.position.z;
    sparkleVelocities[i * 3] = (Math.random() - 0.5) * 12;
    sparkleVelocities[i * 3 + 1] = Math.random() * 8 + 2;
    sparkleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 12;
  }
  sparkleGeo.attributes.position.needsUpdate = true;
  sparkleMat.opacity = 1;
}

// ═══════════════════════════════════
//  DECORATIVE CLOUDS (3D)
// ═══════════════════════════════════
const cloudMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 1,
  metalness: 0,
  transparent: true,
  opacity: 0.7,
});
const cloudGroup = new THREE.Group();

for (let i = 0; i < 20; i++) {
  const g = new THREE.Group();
  const puffCount = 3 + Math.floor(rand() * 4);
  for (let j = 0; j < puffCount; j++) {
    const r = 8 + rand() * 12;
    const puffGeo = new THREE.SphereGeometry(r, 8, 6);
    const puff = new THREE.Mesh(puffGeo, cloudMat);
    puff.position.set(
      (rand() - 0.5) * r * 2,
      (rand() - 0.5) * r * 0.5,
      (rand() - 0.5) * r * 1.5
    );
    puff.scale.y = 0.4 + rand() * 0.3;
    g.add(puff);
  }
  g.position.set(
    (rand() - 0.5) * 800,
    80 + rand() * 100,
    (rand() - 0.5) * 800
  );
  cloudGroup.add(g);
}
scene.add(cloudGroup);

// ═══════════════════════════════════
//  SPEED PARTICLES
// ═══════════════════════════════════
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i++) pPositions[i] = (Math.random() - 0.5) * 20;
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.2,
  transparent: true,
  opacity: 0,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ═══════════════════════════════════
//  CAMERA LOGIC
// ═══════════════════════════════════
let currentT = 0;
let currentSlide = 0;
let isAnimating = false;
let cameraShakeAmount = 0;
let speedIntensity = 0;

const CAMERA_HEIGHT = 2.2;
const LOOK_AHEAD = 0.025; // Much further ahead — key fix for "staring at rails"
const BANK_STRENGTH = 3.5; // Gentle banking (was 15!)

function updateCameraAtT(t) {
  const tClamped = Math.max(0, Math.min(t, 0.998));
  const lookT = Math.min(tClamped + LOOK_AHEAD, 0.999);

  const pos = curve.getPointAt(tClamped);
  const lookPos = curve.getPointAt(lookT);

  camera.position.set(pos.x, pos.y + CAMERA_HEIGHT, pos.z);

  const lookTarget = new THREE.Vector3(lookPos.x, lookPos.y + CAMERA_HEIGHT, lookPos.z);
  camera.lookAt(lookTarget);

  // Gentle banking from curvature
  const tangent = curve.getTangentAt(tClamped).normalize();
  const nextTangent = curve.getTangentAt(lookT).normalize();
  const curvatureVec = new THREE.Vector3().subVectors(nextTangent, tangent);
  const right = new THREE.Vector3().crossVectors(tangent, _up).normalize();
  const bankAngle = curvatureVec.dot(right) * BANK_STRENGTH;
  camera.rotateZ(-bankAngle);

  // Camera shake
  if (cameraShakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * cameraShakeAmount * 0.25;
    camera.position.y += (Math.random() - 0.5) * cameraShakeAmount * 0.15;
    camera.position.z += (Math.random() - 0.5) * cameraShakeAmount * 0.25;
  }

  // Particles
  particles.position.copy(camera.position);
  particleMat.opacity = speedIntensity * 0.5;
}

updateCameraAtT(0);

// ═══════════════════════════════════
//  SLIDE VISIBILITY (screen overlay)
// ═══════════════════════════════════
function showSlide(index) {
  closeModal();
  slideCards.forEach((card, i) => {
    card.classList.toggle('visible', i === index);
  });
  if (index >= 0) fireSparkles();
}

// ═══════════════════════════════════
//  UI
// ═══════════════════════════════════
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('slide-counter');
const hintEl = document.getElementById('hint');
const speedOverlay = document.getElementById('speed-overlay');

for (let i = 0; i < TOTAL_SLIDES; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', (e) => { e.stopPropagation(); goToSlide(i); });
  progressEl.appendChild(dot);
}

function updateUI(slideIndex) {
  counterEl.textContent = `${slideIndex + 1} / ${TOTAL_SLIDES}`;
  progressEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === slideIndex));
}

// ═══════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════
function goToSlide(targetIndex) {
  if (slideCards.length === 0) return;
  if (isAnimating || targetIndex === currentSlide || targetIndex < 0 || targetIndex > TOTAL_SLIDES - 1) return;
  closeModal();
  isAnimating = true;

  if (hintEl.style.opacity !== '0') {
    hintEl.style.opacity = '0';
    setTimeout(() => { hintEl.style.display = 'none'; }, 1000);
  }

  const fromT = stationTs[currentSlide];
  const toT = stationTs[targetIndex];
  const movingForward = targetIndex > currentSlide;
  const segIdx = movingForward ? targetIndex : currentSlide;
  const config = segmentConfig[Math.min(segIdx, TOTAL_SLIDES - 1)];

  const dist = Math.abs(toT - fromT);
  const baseDuration = dist * 15;
  const duration = Math.max(2.0, Math.min(5.5, baseDuration * config.durationScale));

  const isFast = [1, 5].includes(targetIndex);
  const isSlow = [4].includes(targetIndex);

  // Fade out current slide
  showSlide(-1);

  const animObj = { t: fromT };

  gsap.to(animObj, {
    t: toT,
    duration: duration,
    ease: config.ease,
    onUpdate: () => {
      currentT = animObj.t;
      const progress = Math.abs((animObj.t - fromT) / (toT - fromT));

      if (isFast) {
        const ramp = Math.sin(progress * Math.PI);
        cameraShakeAmount = ramp * 0.4;
        speedIntensity = ramp;
        speedOverlay.style.opacity = String(ramp * 0.3);
      } else if (isSlow) {
        cameraShakeAmount = 0;
        speedIntensity = 0;
        speedOverlay.style.opacity = '0';
      } else {
        cameraShakeAmount = 0.03;
        speedIntensity = 0.1;
        speedOverlay.style.opacity = '0';
      }

      updateCameraAtT(currentT);
    },
    onComplete: () => {
      currentSlide = targetIndex;
      isAnimating = false;
      cameraShakeAmount = 0;
      speedIntensity = 0;
      speedOverlay.style.opacity = '0';
      particleMat.opacity = 0;
      showSlide(targetIndex);
      updateUI(targetIndex);
    }
  });
}

function nextSlide() { goToSlide(currentSlide + 1); }
function prevSlide() { goToSlide(currentSlide - 1); }

document.getElementById('nav-next').addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); });
document.getElementById('nav-prev').addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); });
document.addEventListener('click', () => { if (!modalOpen) nextSlide(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOpen) { closeModal(); return; }
  if (modalOpen) return;
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); nextSlide(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); goToSlide(0); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); goToSlide(TOTAL_SLIDES - 1); }
  else if (e.key >= '1' && e.key <= String(TOTAL_SLIDES)) goToSlide(parseInt(e.key) - 1);
});

// ═══════════════════════════════════
//  RESIZE
// ═══════════════════════════════════
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
});

// ═══════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  // Gentle idle sway
  if (!isAnimating) {
    updateCameraAtT(currentT); // re-apply clean camera each frame
    const sway = Math.sin(time * 0.4) * 0.002;
    camera.rotation.z += sway;
  }

  // Slowly drift clouds
  cloudGroup.children.forEach((c, i) => {
    c.position.x += Math.sin(i * 0.3 + time * 0.01) * 0.02;
  });

  // Speed particles
  const posArr = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i * 3 + 2] -= speedIntensity * dt * 40;
    if (posArr[i * 3 + 2] < -10) posArr[i * 3 + 2] = 10;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Lake time uniform
  lakeMat.uniforms.uTime.value = time;

  // Balloon bob & drift
  balloons.forEach(b => {
    const ud = b.userData;
    b.position.y = ud.baseY + Math.sin(time * ud.bobSpeed + ud.phase) * ud.bobAmount;
    b.position.x += Math.sin(time * ud.driftSpeed + ud.phase) * 0.02;
    b.position.z += Math.cos(time * ud.driftSpeed + ud.phase) * 0.02;
  });

  // Ambient particle drift
  ambientParticles.position.copy(camera.position);
  const apArr = ambientParticleGeo.attributes.position.array;
  for (let i = 0; i < ambientParticleCount; i++) {
    const ox = ambientOffsets[i * 3];
    const oy = ambientOffsets[i * 3 + 1];
    const oz = ambientOffsets[i * 3 + 2];
    apArr[i * 3] += Math.sin(time * 0.3 + ox) * 0.01;
    apArr[i * 3 + 1] += Math.sin(time * 0.2 + oy) * 0.008;
    apArr[i * 3 + 2] += Math.cos(time * 0.25 + oz) * 0.01;
    if (apArr[i * 3] > 20) apArr[i * 3] = -20;
    if (apArr[i * 3] < -20) apArr[i * 3] = 20;
    if (apArr[i * 3 + 1] > 10) apArr[i * 3 + 1] = -10;
    if (apArr[i * 3 + 1] < -10) apArr[i * 3 + 1] = 10;
    if (apArr[i * 3 + 2] > 20) apArr[i * 3 + 2] = -20;
    if (apArr[i * 3 + 2] < -20) apArr[i * 3 + 2] = 20;
  }
  ambientParticleGeo.attributes.position.needsUpdate = true;

  // Station sparkle physics & fade
  if (sparkleActive) {
    sparkleTimer += dt;
    const progress = sparkleTimer / SPARKLE_DURATION;
    if (progress >= 1) {
      sparkleActive = false;
      sparkleMat.opacity = 0;
    } else {
      sparkleMat.opacity = 1 - progress;
      for (let i = 0; i < sparkleCount; i++) {
        sparkleVelocities[i * 3 + 1] -= 9.8 * dt;
        sparklePositions[i * 3] += sparkleVelocities[i * 3] * dt;
        sparklePositions[i * 3 + 1] += sparkleVelocities[i * 3 + 1] * dt;
        sparklePositions[i * 3 + 2] += sparkleVelocities[i * 3 + 2] * dt;
      }
      sparkleGeo.attributes.position.needsUpdate = true;
    }
  }

  renderer.render(scene, camera);
}

animate();
</script>
